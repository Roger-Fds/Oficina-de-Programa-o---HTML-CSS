<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MasterVolt</title>
  <link rel="stylesheet" href="../Estilos/Estilização inicial/login.css">
</head>

<body>

  <div class="container">

    <div class="login-box">

      <!-- LOGO -->
      <div class="logo">
        <img src="../image,/logo e erro/logo.png" alt="Logo">
    
        <span>SUA LOJA DE ELETRÔNICOS</span>
      </div>

      <h2>Bem-vindo de volta!</h2>
      <p class="sub">Faça login para acessar sua conta</p>

      <!-- FORM -->
      <form>

        <label>E-mail</label>
        <input type="email" placeholder="seu@email.com" required>

        <label>Senha</label>
        <input type="password" placeholder="****" required>

        <div class="options">
          
          <a href="./Suporte.html">Esqueci minha senha</a>
        </div>

        <div>
            <a href="../index.html" class="buttons">Entrar</a>
        </div>
        

      </form>

      <div class="divider">ou</div>

      <a href="./Suporte.html" class="btn-secundario">Criar nova conta</a>

      <p class="seguro">🔒 Seus dados estão protegidos</p>

    </div>

  </div>

</body>
</html>
